<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flash Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:linear-gradient(135deg,#08111f,#111827,#05070d);color:#fff;min-height:100vh}
header{text-align:center;padding:60px 20px}
h1{font-size:3rem}.sub{color:#9fb3c8;margin-top:10px}
.wrap{width:min(1100px,92%);margin:auto}
.hero,.card{background:rgba(255,255,255,.06);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:28px;margin-bottom:28px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.hero h2{margin-bottom:10px}
.btn{display:inline-block;text-decoration:none;color:#fff;background:#2563eb;padding:12px 22px;border-radius:12px;font-weight:600;transition:.25s}
.btn:hover{transform:translateY(-3px);background:#1d4ed8}
.game{display:flex;justify-content:space-between;align-items:center;gap:20px}
.left{display:flex;align-items:center;gap:18px}
.icon{width:72px;height:72px;border-radius:18px;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:2rem}
p{color:#b8c4d3}
footer{text-align:center;padding:35px;color:#7d8ea3}
@media(max-width:700px){.game{flex-direction:column;text-align:center}.left{flex-direction:column}}
</style>
</head>
<body>
<header>
<h1>🎮 Flash Vault</h1>
<p class="sub">Classic Games preserved in one place.</p>
</header>

<div class="wrap">

<div class="hero">
<h2>📦 Game Collection</h2>
<p>Browse my complete Game archive stored on Google Drive.</p><br>
<a class="btn" href="https://drive.google.com/drive/folders/1N8Biih8_7t_wluPdzZVsdNq014RpXnh-?usp=sharing" target="_blank">☁️ Open Game Collection</a>
</div>

<div class="card game">
<div class="left">
<div class="icon">🍄</div>
<div>
<h2>Super Mario 63</h2>
<p>Platformer • Flash (.swf)</p>
</div>
</div>

<!-- Replace the link below with your game/player URL -->
<a class="btn" href="https://cerpro-official.github.io/test/" target="_blank">▶ Play Now</a>
</div>

</div>

<footer>
Made with ❤️ for Game Preservation
</footer>
</body>
</html>
