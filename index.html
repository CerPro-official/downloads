<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Vault</title>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#070b16;color:#fff;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-20%;background:
radial-gradient(circle at 20% 20%,#2a5cff55,transparent 30%),
radial-gradient(circle at 80% 30%,#8b5cf655,transparent 25%),
radial-gradient(circle at 50% 80%,#00d4ff33,transparent 30%);
filter:blur(40px);animation:f 18s linear infinite;z-index:-1}
@keyframes f{50%{transform:translateY(-30px) scale(1.1)}}
header{padding:60px 6%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.logo{font-size:2.4rem;font-weight:700}
nav a{color:#cbd5e1;text-decoration:none;margin:0 12px}
.hero{margin:0 6%;padding:50px;border-radius:28px;background:linear-gradient(135deg,#2563eb55,#7c3aed55);backdrop-filter:blur(18px)}
.hero h1{font-size:3rem}
.hero p{max-width:650px;color:#d8e2ef;margin:15px 0 25px}
.btn,.toolBtn{display:inline-block;background:#2563eb;color:#fff;text-decoration:none;padding:12px 20px;border:none;border-radius:12px;margin:5px;cursor:pointer}
.search{margin:30px 6%}.search input{width:100%;padding:15px;border-radius:12px;border:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;padding:0 6% 60px}
.card{background:#ffffff10;border:1px solid #ffffff18;border-radius:22px;padding:20px;transition:.25s}
.card:hover{transform:translateY(-6px)}
.badge{display:inline-block;background:#2563eb;padding:4px 10px;border-radius:999px;font-size:.8rem;margin:8px 0}
.cover{height:150px;border-radius:16px;background:linear-gradient(135deg,#1e3a8a,#312e81);display:flex;align-items:center;justify-content:center;font-size:3rem}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:18px}
#overlay.active{display:flex}
#toolbar{width:min(96vw,960px);display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#game{width:min(96vw,960px);aspect-ratio:4/3;max-height:82vh}
</style>
</head>
<body>
<header><div class="logo">🎮 Game Vault</div></header>
<section class="hero"><h1>Your Complete Game Library</h1><p>Play Flash games instantly or download PC, Android and browser games.</p></section>
<div class="search"><input id="s" placeholder="Search games..." oninput="render()"></div>
<div id="grid" class="grid"></div>

<div id="overlay">
<div id="toolbar">
<h2 id="t"></h2>
<div>
<button class="toolBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
<button class="toolBtn" onclick="closeGame()">✕ Close</button>
</div>
</div>
<div id="game"></div>
</div>

<script>
const games=[
{name:"Super Mario 63",type:"Flash",icon:"🍄",swf:"super_mario_63.swf"},
{name:"Strike Force Heroes",type:"Flash",icon:"💥",swf:"strike-force-heroes-1.swf"},
{name:"Strike Force Heroes 2",type:"Flash",icon:"🔥",swf:"strike-force-heroes-2.swf"},
{name:"Strike Force Heroes 3",type:"Flash",icon:"💥",swf:"strike-force-heroes-3.swf"}
];
window.RufflePlayer=window.RufflePlayer||{};
function render(){
let q=s.value.toLowerCase();grid.innerHTML="";
games.filter(g=>g.name.toLowerCase().includes(q)).forEach(g=>{
grid.innerHTML+=`<div class="card"><div class="cover">${g.icon}</div><span class="badge">${g.type}</span><h3>${g.name}</h3><a class="btn" href="#" onclick="play('${g.name}','${g.swf}');return false;">Play</a></div>`;
});
}
render();

function play(n,f){
overlay.classList.add("active");
t.textContent=n;
game.innerHTML="";
let p=RufflePlayer.newest().createPlayer();
p.style.width="100%";
p.style.height="100%";
game.appendChild(p);
p.load({url:f});
}
function closeGame(){
overlay.classList.remove("active");
game.innerHTML="";
}
function toggleFullscreen(){
if(!document.fullscreenElement){
game.requestFullscreen();
}else{
document.exitFullscreen();
}
}
</script>
</body>
</html>
