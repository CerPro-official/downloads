<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Vault</title>
  <link rel="icon" href="logo.png">
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#070b16;color:#fff;overflow-x:hidden}
body:before{content:"";position:fixed;inset:-20%;background:
radial-gradient(circle at 20% 20%,#2a5cff55,transparent 30%),
radial-gradient(circle at 80% 30%,#8b5cf655,transparent 25%),
radial-gradient(circle at 50% 80%,#00d4ff33,transparent 30%);
filter:blur(40px);animation:f 18s linear infinite;z-index:-1}
@keyframes f{50%{transform:translateY(-30px) scale(1.1)}}
header{padding:60px 6%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.logo{font-size:2.4rem;font-weight:700}
nav a{color:#cbd5e1;text-decoration:none;margin:0 12px}
.hero{margin:0 6%;padding:50px;border-radius:28px;background:linear-gradient(135deg,#2563eb55,#7c3aed55);backdrop-filter:blur(18px)}
.hero h1{font-size:3rem}
.hero p{max-width:650px;color:#d8e2ef;margin:15px 0 25px}
.btn,.toolBtn{display:inline-block;background:#2563eb;color:#fff;text-decoration:none;padding:12px 20px;border:none;border-radius:12px;margin:5px;cursor:pointer;transition:.2s}
.btn:hover,.toolBtn:hover{transform:translateY(-2px);background:#1d4ed8}
.search{margin:30px 6%}
.search input{width:100%;padding:15px;border-radius:12px;border:none;outline:none}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;padding:0 6% 60px}
.card{background:#ffffff10;border:1px solid #ffffff18;border-radius:22px;padding:20px;transition:.25s}
.card:hover{transform:translateY(-6px)}
.badge{display:inline-block;background:#2563eb;padding:4px 10px;border-radius:999px;font-size:.8rem;margin:8px 0}
.cover{height:150px;border-radius:16px;background:linear-gradient(135deg,#1e3a8a,#312e81);display:flex;align-items:center;justify-content:center;font-size:3rem}
.card h3{margin:6px 0 8px;line-height:1.2}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:9999;flex-direction:column;align-items:center;justify-content:center;padding:18px;overflow:auto}
#overlay.active{display:flex}
#toolbar{width:min(96vw,960px);display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
#toolbar h2{font-size:1.2rem}
#toolbar > div{display:flex;gap:8px;flex-wrap:wrap}
#game{width:min(96vw,960px);aspect-ratio:4/3;max-height:82vh;background:#000;border-radius:16px;overflow:hidden}
#game ruffle-player, #game iframe, #game object, #game embed{width:100%;height:100%}
@media (max-width:700px){
  header{padding:28px 5%}
  .hero{margin:0 5%;padding:28px}
  .hero h1{font-size:2rem}
  nav{width:100%}
  nav a{margin:0 10px 8px 0;display:inline-block}
  .grid{padding:0 5% 50px}
  #toolbar{width:min(96vw,960px)}
}
</style>
</head>
<body>
<header>
  <div class="logo">🎮 Game Vault</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">PC</a>
    <a href="#">Flash</a>
    <a href="#">Android</a>
    <a href="#">Mods</a>
  </nav>
</header>

<section class="hero">
  <h1>Your Complete Game Library</h1>
  <p>Play Flash games instantly or download PC, Android and browser games from one beautiful hub.</p>
  <a class="btn" href="https://drive.google.com/drive/folders/1N8Biih8_7t_wluPdzZVsdNq014RpXnh-?usp=sharing" target="_blank" rel="noopener noreferrer">☁ Google Drive Collection</a>
</section>

<div class="search">
  <input id="s" placeholder="Search games..." oninput="render()">
</div>

<div id="grid" class="grid"></div>

<div id="overlay">
  <div id="toolbar">
    <h2 id="t"></h2>
    <div>
      <button class="toolBtn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
      <button class="toolBtn" onclick="closeGame()">✕ Close</button>
    </div>
  </div>
  <div id="game"></div>
</div>

<script>
const games = [
  {name:"Super Mario 63",type:"Flash",icon:"🍄",swf:"super_mario_63.swf"},
  {name:"Strike Force Heroes",type:"Flash",icon:"💥",swf:"strike-force-heroes-1.swf"},
  {name:"Strike Force Heroes 2",type:"Flash",icon:"🔥",swf:"strike-force-heroes-2.swf"},
  {name:"Strike Force Heroes 3",type:"Flash",icon:"💥",swf:"strike-force-heroes-3.swf"},
  {name:"There is no game",type:"HTML",icon:"💥",file:"There-is-no-game.html"},
  {name:"Need for Speed Most Wanted (2005)[.zip for windows]",type:"PC",icon:"🚗",url:"#"},
  {name:"FIFA_09.rar",type:"PC",icon:"⚽",url:"#"},
  {name:"NES_games.zip",type:"PC",icon:"💽",url:"https://drive.google.com/file/d/1671Ws5CryHQomPNewtYp_oczbbgkJWVN/view?usp=sharing"},
  {name:"Flash_Games.zip",type:"PC",icon:"✨",url:"https://drive.google.com/file/d/1H_UTE-Vtt2TNHhS4Y1I6JLMj0wj_IrnN/view?usp=sharing"},
];

window.RufflePlayer = window.RufflePlayer || {};

function render(){
  const q = (document.getElementById("s").value || "").toLowerCase();
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  games
    .filter(g => g.name.toLowerCase().includes(q))
    .forEach(g => {
     let action="";

if(g.type==="Flash"){
    action=`<a class="btn" href="#" onclick="play('${g.name.replace(/'/g,"\\'")}','${g.swf}');return false;">Play</a>`;
}
else if(g.type==="HTML"){
    action=`<a class="btn" href="#" onclick="playHTML('${g.name.replace(/'/g,"\\'")}','${g.file}');return false;">Play</a>`;
}

else{
    action=`<a class="btn" href="${g.url}" target="_blank" rel="noopener noreferrer">Download</a>`;
}
      grid.innerHTML += `
        <div class="card">
          <div class="cover">${g.icon}</div>
          <span class="badge">${g.type}</span>
          <h3>${g.name}</h3>
          ${action}
        </div>
      `;
    });
}

render();

function play(n,f){
  const overlay = document.getElementById("overlay");
  const title = document.getElementById("t");
  const game = document.getElementById("game");

  overlay.classList.add("active");
  title.textContent = n;
  game.innerHTML = "";

  const p = RufflePlayer.newest().createPlayer();
  p.style.width = "100%";
  p.style.height = "100%";
  game.appendChild(p);
  p.load({url:f});
}
function playHTML(n,url){
  const overlay = document.getElementById("overlay");
  const title = document.getElementById("t");
  const game = document.getElementById("game");

  overlay.classList.add("active");
  title.textContent = n;

  game.innerHTML = `
    <iframe
      src="${url}"
      style="width:100%;height:100%;border:none;background:#000;"
      allow="fullscreen; autoplay; gamepad"
      allowfullscreen>
    </iframe>
  `;
}

  function playHTML(name,file){
    const overlay=document.getElementById("overlay");
    const title=document.getElementById("t");
    const game=document.getElementById("game");

    overlay.classList.add("active");
    title.textContent=name;

    game.innerHTML=`
        <iframe
            src="${file}"
            style="width:100%;height:100%;border:none;"
            allowfullscreen>
        </iframe>
    `;
}
  
function closeGame(){
  document.getElementById("overlay").classList.remove("active");
  document.getElementById("game").innerHTML = "";
}

function toggleFullscreen(){
  const game = document.getElementById("game");
  if(!document.fullscreenElement){
    game.requestFullscreen?.();
  }else{
    document.exitFullscreen?.();
  }
}
</script>
</body>
</html>
