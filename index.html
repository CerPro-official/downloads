<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Flash Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#111827,#1f2937,#0f172a);
    min-height:100vh;
    color:white;
}

header{
    text-align:center;
    padding:50px 20px 30px;
}

header h1{
    font-size:48px;
    margin-bottom:10px;
}

header p{
    color:#9ca3af;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
}

.game{

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:18px;

    padding:20px;

    margin-bottom:18px;

    transition:.25s;

}

.game:hover{

    transform:translateY(-5px);

    border-color:#3b82f6;

    box-shadow:0 15px 35px rgba(59,130,246,.25);

}

.left{

    display:flex;

    align-items:center;

    gap:18px;

}

.icon{

    width:65px;

    height:65px;

    border-radius:15px;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:32px;

    background:#2563eb;

}

.info h2{

    font-size:22px;

}

.info p{

    color:#9ca3af;

    font-size:14px;

    margin-top:5px;

}

.download{

    text-decoration:none;

}

.download button{

    border:none;

    background:#3b82f6;

    color:white;

    padding:12px 28px;

    font-size:16px;

    border-radius:12px;

    cursor:pointer;

    transition:.25s;

}

.download button:hover{

    background:#2563eb;

    transform:scale(1.05);

}

footer{

    text-align:center;

    color:#6b7280;

    margin:40px;

}

@media(max-width:700px){

.game{

    flex-direction:column;

    gap:20px;

    text-align:center;

}

.left{

    flex-direction:column;

}

}

</style>

</head>
<body>

<header>

<h1>🎮 Flash Vault</h1>

<p>Download classic Flash games</p>

</header>

<div class="container">

<div class="game">

<div class="left">

<div class="icon">🍄</div>

<div class="info">

<h2>Super Mario 63</h2>

<p>Platformer • Flash (.swf)</p>

</div>

</div>

<a class="download" href="games/super_mario_63.swf" download>

<button>⬇ Download</button>

</a>

</div>

<div class="game">

<div class="left">

<div class="icon">🖊️</div>

<div class="info">

<h2>Fancy Pants Adventures</h2>

<p>Platformer • Flash (.swf)</p>

</div>

</div>

<a class="download" href="games/fancy_pants.swf" download>

<button>⬇ Download</button>

</a>

</div>

<div class="game">

<div class="left">

<div class="icon">⚔️</div>

<div class="info">

<h2>Age of War</h2>

<p>Strategy • Flash (.swf)</p>

</div>

</div>

<a class="download" href="games/age_of_war.swf" download>

<button>⬇ Download</button>

</a>

</div>

<div class="game">

<div class="left">

<div class="icon">🔫</div>

<div class="info">

<h2>Strike Force Heroes</h2>

<p>Shooter • Flash (.swf)</p>

</div>

</div>

<a class="download" href="games/strike_force_heroes.swf" download>

<button>⬇ Download</button>

</a>

</div>

</div>

<footer>

Made with ❤️ for Flash game preservation

</footer>

</body>
</html>
